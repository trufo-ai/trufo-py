name: main-merge-guard

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, edited]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  main-merge-guard:
    name: main-merge-guard
    runs-on: ubuntu-latest
    steps:
      - name: Require trufo-ai author or approval
        uses: actions/github-script@v7
        with:
          script: |
            const requiredLogin = 'trufo-ai';
            const pull = context.payload.pull_request;

            if (!pull) {
              core.setFailed('main-merge-guard must run in a pull request context.');
              return;
            }

            if (pull.user?.login === requiredLogin) {
              core.info(`PR author is ${requiredLogin}; merge guard passed.`);
              return;
            }

            const { owner, repo } = context.repo;
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pull.number,
              per_page: 100,
            });

            const approved = reviews.some((review) => (
              review.user?.login === requiredLogin &&
              review.state === 'APPROVED' &&
              review.commit_id === pull.head.sha
            ));

            if (!approved) {
              core.setFailed(
                `PRs into main must either be opened by ${requiredLogin} or approved by ${requiredLogin} on the current head commit.`
              );
              return;
            }

            core.info(`Current PR head commit has an approval from ${requiredLogin}; merge guard passed.`);
