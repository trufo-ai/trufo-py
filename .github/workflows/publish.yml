# Publish to PyPI using Trusted Publishing (OIDC).
# Triggered when a GitHub Release is created.
#
# Prerequisites:
#   - A "pending publisher" registered on PyPI for this repo + workflow
#   - A "pypi" environment configured in the repo's GitHub Settings
#
# To publish:
#   1. Update the version in pyproject.toml
#   2. Create a GitHub Release with a tag like "v0.1.0"
#   3. This workflow runs automatically

name: Publish to PyPI
run-name: "release: trufo-py ${{ github.event.release.tag_name }}"

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches pyproject.toml version
        run: |
          PKG_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "pyproject.toml version: $PKG_VERSION"
          echo "Release tag version:    $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: version mismatch — pyproject.toml has $PKG_VERSION but tag is $TAG_VERSION"
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
