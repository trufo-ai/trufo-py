# Publish to PyPI using Trusted Publishing (OIDC).
# Triggered when a GitHub Release is created.
#
# Prerequisites:
#   - A "pending publisher" registered on PyPI for this repo + workflow
#   - A "pypi" environment configured in the repo's GitHub Settings
#
# To publish:
#   1. Update the version in pyproject.toml
#   2. Create a GitHub Release with a tag like "v0.1.0"
#   3. This workflow runs automatically

name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
